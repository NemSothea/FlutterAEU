name: fieldlog_flutter
description: "FieldLog — the capstone app for Cross-Platform Mobile Application Development (Master's, Asia Euro University)."
publish_to: "none" # never accidentally publish to pub.dev
version: 0.1.0+1

# Week 1 (E01.1): the skeleton, structured the right way.
# Source code lives under lib/src/features/<feature>/ — never directly in lib/.

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^17.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
